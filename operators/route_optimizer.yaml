schema: user-defined-operator-v0.1.0
type: python-run-function
name: Route Optimizer
id: accelerators.route_optimizer
version: '1.0.0'
description: Solve capacitated parcel-delivery routes with time windows using Google OR-Tools.

config:
  type: object
  properties:
    id_column:
      type: string
      title: Stop ID Column
      description: Input column containing parcel or stop identifiers.
      x-ui:
        widget: select
        optionsSource:
          type: inputColumns
          port: stops
    lat_column:
      type: string
      title: Latitude Column
      description: Input column containing stop latitude in decimal degrees.
      x-ui:
        widget: select
        optionsSource:
          type: inputColumns
          port: stops
    lon_column:
      type: string
      title: Longitude Column
      description: Input column containing stop longitude in decimal degrees.
      x-ui:
        widget: select
        optionsSource:
          type: inputColumns
          port: stops
    demand_column:
      type: string
      title: Demand Column
      description: Input column containing integer parcel demand/load units.
      x-ui:
        widget: select
        optionsSource:
          type: inputColumns
          port: stops
    due_minutes_column:
      type: string
      title: Due Minute Column
      description: Input column containing latest allowed arrival minute from route start.
      x-ui:
        widget: select
        optionsSource:
          type: inputColumns
          port: stops
    ready_minutes_column:
      type: string
      title: Ready Minute Column
      description: Optional input column containing earliest allowed arrival minute from route start.
      x-ui:
        widget: select
        optionsSource:
          type: inputColumns
          port: stops
    depot_lat:
      type: number
      title: Depot Latitude
      description: Depot latitude in decimal degrees.
      x-ui:
        widget: number
    depot_lon:
      type: number
      title: Depot Longitude
      description: Depot longitude in decimal degrees.
      x-ui:
        widget: number
    vehicle_count:
      type: integer
      title: Vehicle Count
      description: Number of available delivery vehicles.
      default: 5
      x-ui:
        widget: number
    vehicle_capacity:
      type: integer
      title: Vehicle Capacity
      description: Uniform capacity per vehicle.
      default: 100
      x-ui:
        widget: number
    max_route_minutes:
      type: integer
      title: Max Route Minutes
      description: Maximum route duration per vehicle.
      default: 480
      x-ui:
        widget: number
    avg_speed_kph:
      type: number
      title: Average Speed KPH
      description: Average travel speed for haversine distance conversion.
      default: 50
      x-ui:
        widget: number
    service_minutes:
      type: integer
      title: Service Minutes
      description: Service time charged at each stop.
      default: 10
      x-ui:
        widget: number
    solver_seconds:
      type: integer
      title: Solver Seconds
      description: OR-Tools search time limit in seconds.
      default: 10
      x-ui:
        widget: number
    drop_penalty:
      type: integer
      title: Drop Penalty
      description: Penalty for dropping a stop when routing is infeasible or too expensive.
      default: 1000000
      x-ui:
        widget: number

  required:
    - id_column
    - lat_column
    - lon_column
    - demand_column
    - due_minutes_column
    - depot_lat
    - depot_lon
  additionalProperties: false

ports:
  input:
    - name: stops
      title: Stops
      description: Parcel stops with coordinates, demand, and due-by minutes.
      mime: application/vnd.databricks.dataframe
      required: true
  output:
    - name: routes
      title: Routes
      description: Optimized route rows with vehicle_id, stop_sequence, stop_id, lat, lon, arrival_minute, load_after, and is_dropped columns.
      mime: application/vnd.databricks.dataframe

run_function:
  type: inline
  code: |
    import numpy as np
    from ortools.constraint_solver import pywrapcp, routing_enums_pb2

    # Mean Earth radius (meters), matching the gas-tank-delivery template.
    _EARTH_RADIUS_M = 6371008.8


    def haversine_matrix(
        lats: list[float],
        lons: list[float],
        avg_speed_kph: float,
    ) -> list[list[int]]:
        """Symmetric travel-time matrix in whole minutes; diagonal = 0.

        Node order is the caller's order (node 0 must be the depot). Great-circle
        distance between every pair of nodes is converted to minutes using a single
        average-speed constant, then rounded to the nearest whole minute.

        Args:
            lats: latitudes in degrees, one per node, depot first.
            lons: longitudes in degrees, one per node, depot first.
            avg_speed_kph: average travel speed used for the distance->minutes
                conversion. Must be > 0.

        Returns:
            ``n x n`` list-of-lists of non-negative integer travel minutes,
            symmetric, with a zero diagonal.
        """
        if avg_speed_kph <= 0:
            raise ValueError("avg_speed_kph must be positive")
        if len(lats) != len(lons):
            raise ValueError("lats and lons must have the same length")

        lat_r = np.radians(np.asarray(lats, dtype=float))
        lon_r = np.radians(np.asarray(lons, dtype=float))

        dlat = lat_r[:, None] - lat_r[None, :]
        dlon = lon_r[:, None] - lon_r[None, :]
        a = (
            np.sin(dlat / 2.0) ** 2
            + np.cos(lat_r)[:, None] * np.cos(lat_r)[None, :] * np.sin(dlon / 2.0) ** 2
        )
        meters = _EARTH_RADIUS_M * 2.0 * np.arcsin(np.minimum(1.0, np.sqrt(a)))

        speed_mps = avg_speed_kph * 1000.0 / 3600.0
        travel_min = np.rint(meters / speed_mps / 60.0).astype(np.int64)
        np.fill_diagonal(travel_min, 0)

        return travel_min.tolist()


    def solve_cvrptw(stops: list[dict], params: dict) -> list[dict]:
        """Solve a CVRPTW and return a flat route plan.

        Args:
            stops: rows with keys ``stop_id``, ``lat``, ``lon``, ``demand``,
                ``due_minute`` (and optional ``ready_minute``, default 0). The depot
                is NOT a member of this list — its coordinates come from ``params``.
            params: keys ``depot_lat``, ``depot_lon`` (float); ``vehicle_count``,
                ``vehicle_capacity``, ``max_route_minutes``, ``service_minutes``,
                ``solver_seconds``, ``drop_penalty`` (int); ``avg_speed_kph``
                (float). ``vehicle_capacity`` is uniform across the fleet for v1.

        Returns:
            Route-plan rows, one per VISITED stop, ordered by
            ``(vehicle_id, stop_sequence)``, each with keys ``vehicle_id`` (int),
            ``stop_sequence`` (int), ``stop_id``, ``lat`` (float), ``lon`` (float),
            ``arrival_minute`` (int), ``load_after`` (int), ``is_dropped`` (bool).
            Stops dropped via disjunction are appended with ``vehicle_id = -1``,
            ``stop_sequence = -1``, ``is_dropped = True`` so the caller can report
            unserved parcels.
        """
        depot_lat = float(params["depot_lat"])
        depot_lon = float(params["depot_lon"])
        vehicle_count = int(params["vehicle_count"])
        vehicle_capacity = int(params["vehicle_capacity"])
        max_route_minutes = int(params["max_route_minutes"])
        avg_speed_kph = float(params["avg_speed_kph"])
        service_minutes = int(params["service_minutes"])
        solver_seconds = int(params["solver_seconds"])
        drop_penalty = int(params["drop_penalty"])

        n_stops = len(stops)

        # No stops to route -> empty plan.
        if n_stops == 0:
            return []

        # Node 0 = depot, then one node per stop in caller order.
        lats = [depot_lat] + [float(s["lat"]) for s in stops]
        lons = [depot_lon] + [float(s["lon"]) for s in stops]
        travel_min = haversine_matrix(lats, lons, avg_speed_kph)

        demands = [0] + [int(round(float(s["demand"]))) for s in stops]
        ready = [0] + [int(s.get("ready_minute", 0)) for s in stops]
        due = [0] + [int(s["due_minute"]) for s in stops]

        n_nodes = n_stops + 1
        capacities = [vehicle_capacity] * vehicle_count

        manager = pywrapcp.RoutingIndexManager(n_nodes, vehicle_count, 0)
        routing = pywrapcp.RoutingModel(manager)

        # Arc cost = travel minutes + per-stop service time (charged on departure
        # from a real stop; nothing is charged for leaving the depot).
        def time_cb(from_index, to_index):
            a_node = manager.IndexToNode(from_index)
            b_node = manager.IndexToNode(to_index)
            service = service_minutes if a_node != 0 else 0
            return int(travel_min[a_node][b_node] + service)

        time_idx = routing.RegisterTransitCallback(time_cb)
        routing.SetArcCostEvaluatorOfAllVehicles(time_idx)

        # Capacity dimension caps demand units per vehicle.
        def demand_cb(from_index):
            return int(demands[manager.IndexToNode(from_index)])

        demand_idx = routing.RegisterUnaryTransitCallback(demand_cb)
        routing.AddDimensionWithVehicleCapacity(
            demand_idx,
            0,  # null capacity slack
            capacities,  # per-vehicle capacity
            True,  # start cumul at zero
            "Capacity",
        )

        # Time dimension with per-stop [ready, due] windows.
        routing.AddDimension(
            time_idx,
            max_route_minutes,  # waiting slack allowed at each stop
            max_route_minutes,  # max cumulative time per vehicle (shift length)
            False,  # don't force start cumul to zero (set explicitly below)
            "Time",
        )
        time_dim = routing.GetDimensionOrDie("Time")
        for stop_i in range(n_stops):
            index = manager.NodeToIndex(stop_i + 1)
            time_dim.CumulVar(index).SetRange(ready[stop_i + 1], due[stop_i + 1])
        for v in range(vehicle_count):
            time_dim.CumulVar(routing.Start(v)).SetRange(0, 0)

        # Each stop is optional via a disjunction with a large drop penalty: the
        # solver only drops a stop when serving it is infeasible or costs more than
        # the penalty. Better to drop a stop than to return no solution at all.
        for node in range(1, n_nodes):
            routing.AddDisjunction([manager.NodeToIndex(node)], drop_penalty)

        search = pywrapcp.DefaultRoutingSearchParameters()
        search.first_solution_strategy = (
            routing_enums_pb2.FirstSolutionStrategy.PARALLEL_CHEAPEST_INSERTION
        )
        search.local_search_metaheuristic = (
            routing_enums_pb2.LocalSearchMetaheuristic.GUIDED_LOCAL_SEARCH
        )
        search.time_limit.seconds = solver_seconds

        solution = routing.SolveWithParameters(search)
        if solution is None:
            raise RuntimeError(
                "OR-Tools found no feasible solution — relax windows, raise "
                "vehicle_count/capacity, or increase solver_seconds."
            )

        capacity_dim = routing.GetDimensionOrDie("Capacity")

        rows: list[dict] = []
        visited_nodes: set[int] = set()
        for v in range(vehicle_count):
            index = routing.Start(v)
            seq = 0
            while not routing.IsEnd(index):
                node = manager.IndexToNode(index)
                if node != 0:
                    seq += 1
                    stop = stops[node - 1]
                    visited_nodes.add(node)
                    # The Capacity CumulVar holds the load BEFORE this stop's demand
                    # (the unary transit is charged at the from-node), so add this
                    # node's own demand to report the load AFTER serving the stop.
                    load_before = int(solution.Value(capacity_dim.CumulVar(index)))
                    rows.append(
                        {
                            "vehicle_id": v,
                            "stop_sequence": seq,
                            "stop_id": stop["stop_id"],
                            "lat": float(stop["lat"]),
                            "lon": float(stop["lon"]),
                            "arrival_minute": int(
                                solution.Value(time_dim.CumulVar(index))
                            ),
                            "load_after": load_before + demands[node],
                            "is_dropped": False,
                        }
                    )
                index = solution.Value(routing.NextVar(index))

        # Any stop whose node never appeared on a route was dropped.
        for node in range(1, n_nodes):
            if node not in visited_nodes:
                stop = stops[node - 1]
                rows.append(
                    {
                        "vehicle_id": -1,
                        "stop_sequence": -1,
                        "stop_id": stop["stop_id"],
                        "lat": float(stop["lat"]),
                        "lon": float(stop["lon"]),
                        "arrival_minute": -1,
                        "load_after": -1,
                        "is_dropped": True,
                    }
                )

        return rows



    ROUTES_SCHEMA = "vehicle_id INT, stop_sequence INT, stop_id STRING, lat DOUBLE, lon DOUBLE, arrival_minute INT, load_after INT, is_dropped BOOLEAN"
    ROUTES_COLUMNS = [
        "vehicle_id",
        "stop_sequence",
        "stop_id",
        "lat",
        "lon",
        "arrival_minute",
        "load_after",
        "is_dropped",
    ]


    def _get_config(config, key, default=None):
        if isinstance(config, dict):
            return config.get(key, default)
        return getattr(config, key, default)


    def _is_null(value):
        return value is None or value != value


    def _to_stop(row, config):
        ready_column = _get_config(config, "ready_minutes_column")
        ready_value = 0
        if ready_column:
            candidate = row.get(ready_column)
            if not _is_null(candidate):
                ready_value = int(round(float(candidate)))

        return {
            "stop_id": str(row[_get_config(config, "id_column")]),
            "lat": float(row[_get_config(config, "lat_column")]),
            "lon": float(row[_get_config(config, "lon_column")]),
            "demand": int(round(float(row[_get_config(config, "demand_column")]))),
            "due_minute": int(round(float(row[_get_config(config, "due_minutes_column")]))),
            "ready_minute": ready_value,
        }


    def run(config, inputs, spark):
        stops_pdf = inputs["stops"].toPandas()
        stops = [_to_stop(row, config) for row in stops_pdf.to_dict("records")]
        params = {
            "depot_lat": float(_get_config(config, "depot_lat")),
            "depot_lon": float(_get_config(config, "depot_lon")),
            "vehicle_count": int(_get_config(config, "vehicle_count", 5)),
            "vehicle_capacity": int(_get_config(config, "vehicle_capacity", 100)),
            "max_route_minutes": int(_get_config(config, "max_route_minutes", 480)),
            "avg_speed_kph": float(_get_config(config, "avg_speed_kph", 50)),
            "service_minutes": int(_get_config(config, "service_minutes", 10)),
            "solver_seconds": int(_get_config(config, "solver_seconds", 10)),
            "drop_penalty": int(_get_config(config, "drop_penalty", 1000000)),
        }
        plan_rows = solve_cvrptw(stops, params)
        route_tuples = [tuple(row[column] for column in ROUTES_COLUMNS) for row in plan_rows]
        return {"routes": spark.createDataFrame(route_tuples, schema=ROUTES_SCHEMA)}


environment:
  environment_version: '4'
  dependencies:
    - ortools==9.14.6206
